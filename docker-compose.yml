services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rnmc-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8000
      DATABASE_PATH: /data/rnmc.db
    volumes:
      - rnmc_data:/data
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 600s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: rnmc-web
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: rnmc-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  rnmc_data:
    name: rnmc_data
  caddy_data:
    name: caddy_data
  caddy_config:
    name: caddy_config
